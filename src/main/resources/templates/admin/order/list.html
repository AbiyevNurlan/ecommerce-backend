<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.w3.org/1999/xhtml"
      layout:decorate="~{admin/layout}" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="utf-8">
    <title>Sifarişlər — Admin</title>
</head>

<body id="page-top">

<div id="wrapper">
    <div id="content-wrapper" class="d-flex flex-column">

        <div layout:fragment="content" class="container-fluid">

            <h1 class="h3 mb-4 text-gray-800">Sifarişlər</h1>

            <!-- Flash messages -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
            </div>

            <!-- No orders -->
            <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info">
                Hələ heç bir sifariş yoxdur.
            </div>

            <!-- Orders table -->
            <div th:if="${!#lists.isEmpty(orders)}" class="card shadow mb-4">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-primary">Bütün sifarişlər</h6>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-bordered" width="100%" cellspacing="0">
                            <thead>
                            <tr>
                                <th>#</th>
                                <th>İstifadəçi</th>
                                <th>Ünvan</th>
                                <th>Məhsullar</th>
                                <th>Ümumi</th>
                                <th>Status</th>
                                <th>Yenilə</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="order : ${orders}">
                                <td th:text="${order.id}"></td>
                                <td>
                                    <div th:text="${order.userName}"></div>
                                    <small class="text-muted" th:text="${order.userEmail}"></small>
                                </td>
                                <td th:text="${order.address}"></td>
                                <td>
                                    <ul class="list-unstyled mb-0">
                                        <li th:each="item : ${order.orderItems}">
                                            <span th:text="${item.productName}"></span>
                                            &times;<span th:text="${item.quantity}"></span>
                                            — <span th:text="${'$' + item.itemTotal}"></span>
                                        </li>
                                    </ul>
                                </td>
                                <td><strong th:text="${'$' + order.totalPrice}"></strong></td>
                                <td>
                                    <span class="badge badge-primary" th:text="${order.orderStatus}"></span>
                                </td>
                                <td>
                                    <form th:action="'/dashboard/order/' + ${order.id} + '/status'"
                                          method="post" class="d-flex align-items-center gap-1">
                                        <input type="hidden"
                                               th:name="${_csrf.parameterName}"
                                               th:value="${_csrf.token}">
                                        <select name="status" class="form-control form-control-sm mr-2">
                                            <option th:each="s : ${statuses}"
                                                    th:value="${s.name()}"
                                                    th:text="${s.name()}"
                                                    th:selected="${s.name() == order.orderStatus}">
                                            </option>
                                        </select>
                                        <button type="submit" class="btn btn-sm btn-primary">Yenilə</button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
