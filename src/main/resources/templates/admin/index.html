<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.w3.org/1999/xhtml"
                layout:decorate="~{admin/layout}">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>ShopHub Admin - Dashboard</title>

</head>

<body id="page-top">

<!-- Page Wrapper -->
<div id="wrapper">


    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">



            <!-- Begin Page Content -->
            <div layout:fragment="content" class="container-fluid">

                <!-- Page Heading -->
                <div class="d-sm-flex align-items-center justify-content-between mb-4">
                    <h1 class="h3 mb-0 text-gray-800">Dashboard</h1>
                </div>

                <!-- Content Row — Stat Cards -->
                <div class="row">

                    <!-- Products Card -->
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card border-left-primary shadow h-100 py-2">
                            <div class="card-body">
                                <div class="row no-gutters align-items-center">
                                    <div class="col mr-2">
                                        <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">
                                            Məhsullar</div>
                                        <div class="h5 mb-0 font-weight-bold text-gray-800" th:text="${totalProducts}">0</div>
                                    </div>
                                    <div class="col-auto">
                                        <i class="fas fa-box fa-2x text-gray-300"></i>
                                    </div>
                                </div>
                            </div>
                            <a class="card-footer text-center small" th:href="@{/dashboard/product}">
                                Hamısına bax <i class="fas fa-arrow-right"></i>
                            </a>
                        </div>
                    </div>

                    <!-- Orders Card -->
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card border-left-success shadow h-100 py-2">
                            <div class="card-body">
                                <div class="row no-gutters align-items-center">
                                    <div class="col mr-2">
                                        <div class="text-xs font-weight-bold text-success text-uppercase mb-1">
                                            Sifarişlər</div>
                                        <div class="h5 mb-0 font-weight-bold text-gray-800" th:text="${totalOrders}">0</div>
                                    </div>
                                    <div class="col-auto">
                                        <i class="fas fa-shopping-bag fa-2x text-gray-300"></i>
                                    </div>
                                </div>
                            </div>
                            <a class="card-footer text-center small" th:href="@{/dashboard/order}">
                                Hamısına bax <i class="fas fa-arrow-right"></i>
                            </a>
                        </div>
                    </div>

                    <!-- Users Card -->
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card border-left-info shadow h-100 py-2">
                            <div class="card-body">
                                <div class="row no-gutters align-items-center">
                                    <div class="col mr-2">
                                        <div class="text-xs font-weight-bold text-info text-uppercase mb-1">
                                            İstifadəçilər</div>
                                        <div class="h5 mb-0 font-weight-bold text-gray-800" th:text="${totalUsers}">0</div>
                                    </div>
                                    <div class="col-auto">
                                        <i class="fas fa-users fa-2x text-gray-300"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Sellers Card -->
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card border-left-warning shadow h-100 py-2">
                            <div class="card-body">
                                <div class="row no-gutters align-items-center">
                                    <div class="col mr-2">
                                        <div class="text-xs font-weight-bold text-warning text-uppercase mb-1">
                                            Satıcılar</div>
                                        <div class="h5 mb-0 font-weight-bold text-gray-800" th:text="${totalSellers}">0</div>
                                    </div>
                                    <div class="col-auto">
                                        <i class="fas fa-store fa-2x text-gray-300"></i>
                                    </div>
                                </div>
                            </div>
                            <a class="card-footer text-center small" th:href="@{/dashboard/sellers}">
                                Hamısına bax <i class="fas fa-arrow-right"></i>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Content Row — Revenue -->
                <div class="row">
                    <div class="col-lg-6 mb-4">
                        <div class="card shadow">
                            <div class="card-header py-3">
                                <h6 class="m-0 font-weight-bold text-primary">
                                    <i class="fas fa-chart-line mr-1"></i> Ümumi Gəlir
                                </h6>
                            </div>
                            <div class="card-body text-center">
                                <div class="h2 font-weight-bold text-success" th:text="${totalRevenue} + ' ₼'">0 ₼</div>
                                <p class="text-muted mb-0">Bütün sifarişlərdən əldə edilən gəlir</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-6 mb-4">
                        <div class="card shadow">
                            <div class="card-header py-3">
                                <h6 class="m-0 font-weight-bold text-primary">
                                    <i class="fas fa-list mr-1"></i> Kateqoriyalar
                                </h6>
                            </div>
                            <div class="card-body text-center">
                                <div class="h2 font-weight-bold text-info" th:text="${totalCategories}">0</div>
                                <p class="text-muted mb-0">Aktiv kateqoriya sayı</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Content Row — Recent Orders -->
                <div class="row">
                    <div class="col-12">
                        <div class="card shadow mb-4">
                            <div class="card-header py-3 d-flex justify-content-between align-items-center">
                                <h6 class="m-0 font-weight-bold text-primary">
                                    <i class="fas fa-clock mr-1"></i> Son Sifarişlər
                                </h6>
                                <a th:href="@{/dashboard/order}" class="btn btn-sm btn-primary">Hamısı</a>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-bordered table-hover" width="100%" cellspacing="0">
                                        <thead class="thead-light">
                                        <tr>
                                            <th>#</th>
                                            <th>Müştəri</th>
                                            <th>Ünvan</th>
                                            <th>Status</th>
                                            <th>Məbləğ</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:each="order : ${recentOrders}">
                                            <td th:text="${order.id}"></td>
                                            <td th:text="${order.user.email}"></td>
                                            <td th:text="${order.address}"></td>
                                            <td>
                                                <span class="badge"
                                                      th:classappend="${order.orderStatus.name() == 'PENDING' ? 'badge-warning' :
                                                        (order.orderStatus.name() == 'CONFIRMED' ? 'badge-info' :
                                                        (order.orderStatus.name() == 'DELIVERED' ? 'badge-success' :
                                                        (order.orderStatus.name() == 'CANCELLED' ? 'badge-danger' : 'badge-secondary')))}"
                                                      th:text="${order.orderStatus}"></span>
                                            </td>
                                            <td>
                                                <span th:text="${#numbers.formatDecimal(order.orderItems.stream().map(i -> i.price * i.quantity).reduce(0.0, (a,b) -> a + b), 1, 2)} + ' ₼'"></span>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(recentOrders)}">
                                            <td colspan="5" class="text-center text-muted">Hələ sifariş yoxdur</td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <!-- /.container-fluid -->




    </div>
    <!-- End of Content Wrapper -->

</div>
<!-- End of Page Wrapper -->

</body>

</html>
