<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.w3.org/1999/xhtml"
      xmlns:layout="http://www.w3.org/1999/xhtml"
      layout:decorate="~{layout}">

<head>
    <meta charset="UTF-8">
    <title>Sifarişlərim</title>
</head>

<body>

<div layout:fragment="content">

    <!-- Breadcrumb Begin -->
    <div class="breadcrumb-option">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <div class="breadcrumb__links">
                        <a th:href="@{/}"><i class="fa fa-home"></i> Ana səhifə</a>
                        <span>Sifarişlərim</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Breadcrumb End -->

    <section class="spad">
        <div class="container">

            <!-- Flash messages -->
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <h4 class="mb-4">Sifarişlərim</h4>

            <!-- No orders -->
            <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
                <p>Hələ heç bir sifarişiniz yoxdur.</p>
                <a th:href="@{/shop}" class="site-btn">Alış-verişə başla</a>
            </div>

            <!-- Orders list -->
            <div th:each="order : ${orders}" class="mb-5">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><strong>Sifariş #</strong><span th:text="${order.id}"></span></span>
                        <span>
                            Status:
                            <strong th:text="${order.orderStatus}"></strong>
                        </span>
                        <span th:text="${order.address}">Ünvan</span>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-sm mb-0">
                            <thead class="thead-light">
                            <tr>
                                <th>Məhsul</th>
                                <th>Qiymət</th>
                                <th>Miqdar</th>
                                <th>Cəmi</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${order.orderItems}">
                                <td th:text="${item.productName}">Məhsul</td>
                                <td th:text="${'$' + item.price}">Qiymət</td>
                                <td th:text="${item.quantity}">1</td>
                                <td th:text="${'$' + item.itemTotal}">Cəmi</td>
                            </tr>
                            </tbody>
                            <tfoot>
                            <tr>
                                <td colspan="3" class="text-right"><strong>Ümumi:</strong></td>
                                <td><strong th:text="${'$' + order.totalPrice}"></strong></td>
                            </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </section>

</div>

</body>
</html>
