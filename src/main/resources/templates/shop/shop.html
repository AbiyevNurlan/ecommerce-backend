<!DOCTYPE html>
<html lang="zxx" xmlns:th="http://www.w3.org/1999/xhtml"
      xmlns:layout="http://www.w3.org/1999/xhtml"
      layout:decorate="~{layout}">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Ashion Template">
    <meta name="keywords" content="Ashion, unica, creative, html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Ashion | Template</title>


</head>

<body>


<div  layout:fragment="content">

    <!-- Breadcrumb Begin -->
    <div class="breadcrumb-option">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <div class="breadcrumb__links">
                        <a th:href="@{/}"><i class="fa fa-home"></i> Home</a>
                        <a th:href="@{/shop}">Shop</a>
                        <span th:if="${selectedCategory != null}" th:text="${selectedCategory}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Breadcrumb End -->

    <!-- Shop Section Begin -->
    <section class="shop spad">
        <div class="container">
            <div class="row">
                <div class="col-lg-3 col-md-3">
                    <div class="shop__sidebar">
                        <!-- Search Box -->
                        <div class="sidebar__filter" style="margin-bottom:20px">
                            <div class="section-title">
                                <h4>Search Products</h4>
                            </div>
                            <form method="get" th:action="@{/shop}" style="display:flex;gap:6px">
                                <input type="text" name="q" th:value="${query}"
                                       placeholder="Product name, category..."
                                       style="flex:1;border:1px solid #e1e1e1;padding:8px 12px;font-size:13px;outline:none"/>
                                <button type="submit"
                                        style="background:#0d6efd;color:#fff;border:none;padding:8px 14px;cursor:pointer;font-size:13px">
                                    <i class="fa fa-search"></i>
                                </button>
                            </form>
                            <div th:if="${query != null and !query.isEmpty()}" style="margin-top:8px;font-size:13px;color:#555">
                                <span th:if="${#lists.size(products) > 0}">
                                    <strong th:text="${#lists.size(products)}">0</strong> result(s) for
                                    &ldquo;<em th:text="${query}"></em>&rdquo;
                                    &nbsp;<a th:href="@{/shop}" style="color:#999;font-size:12px">Clear</a>
                                </span>
                                <span th:if="${#lists.size(products) == 0}" style="color:#c0392b">
                                    No results for &ldquo;<em th:text="${query}"></em>&rdquo;.
                                    <a th:href="@{/shop}">Clear</a>
                                </span>
                            </div>
                        </div>

                        <div class="sidebar__categories">
                            <div class="section-title">
                                <h4>Categories</h4>
                            </div>
                            <div class="categories__accordion">
                                <div class="accordion" id="accordionExample">
                                    <!-- All Products -->
                                    <div class="card">
                                        <div class="card-heading" th:classappend="${selectedCategory == null} ? ' active' : ''">
                                            <a th:href="@{/shop}">All Products</a>
                                        </div>
                                    </div>
                                    <!-- Dynamic categories from DB -->
                                    <div th:each="cat : ${categories}" class="card">
                                        <div class="card-heading"
                                             th:classappend="${selectedCategory != null and selectedCategory == cat.seoUrl} ? ' active' : ''">
                                            <a th:href="@{/shop(category=${cat.seoUrl})}"
                                               th:text="${cat.name}">Category</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="sidebar__filter">
                            <div class="section-title">
                                <h4>Shop by price</h4>
                            </div>
                            <div class="filter-range-wrap">
                                <div class="price-range ui-slider ui-corner-all ui-slider-horizontal ui-widget ui-widget-content"
                                     data-min="33" data-max="99"></div>
                                <div class="range-slider">
                                    <div class="price-input">
                                        <p>Price:</p>
                                        <input type="text" id="minamount">
                                        <input type="text" id="maxamount">
                                    </div>
                                </div>
                            </div>
                            <a href="#">Filter</a>
                        </div>
                        <div class="sidebar__sizes">
                            <div class="section-title">
                                <h4>Shop by size</h4>
                            </div>
                            <div class="size__list">
                                <label for="xxs">
                                    xxs
                                    <input type="checkbox" id="xxs">
                                    <span class="checkmark"></span>
                                </label>
                                <label for="xs">
                                    xs
                                    <input type="checkbox" id="xs">
                                    <span class="checkmark"></span>
                                </label>
                                <label for="xss">
                                    xs-s
                                    <input type="checkbox" id="xss">
                                    <span class="checkmark"></span>
                                </label>
                                <label for="s">
                                    s
                                    <input type="checkbox" id="s">
                                    <span class="checkmark"></span>
                                </label>
                                <label for="m">
                                    m
                                    <input type="checkbox" id="m">
                                    <span class="checkmark"></span>
                                </label>
                                <label for="ml">
                                    m-l
                                    <input type="checkbox" id="ml">
                                    <span class="checkmark"></span>
                                </label>
                                <label for="l">
                                    l
                                    <input type="checkbox" id="l">
                                    <span class="checkmark"></span>
                                </label>
                                <label for="xl">
                                    xl
                                    <input type="checkbox" id="xl">
                                    <span class="checkmark"></span>
                                </label>
                            </div>
                        </div>
                        <div class="sidebar__color">
                            <div class="section-title">
                                <h4>Shop by size</h4>
                            </div>
                            <div class="size__list color__list">
                                <label for="black">
                                    Blacks
                                    <input type="checkbox" id="black">
                                    <span class="checkmark"></span>
                                </label>
                                <label for="whites">
                                    Whites
                                    <input type="checkbox" id="whites">
                                    <span class="checkmark"></span>
                                </label>
                                <label for="reds">
                                    Reds
                                    <input type="checkbox" id="reds">
                                    <span class="checkmark"></span>
                                </label>
                                <label for="greys">
                                    Greys
                                    <input type="checkbox" id="greys">
                                    <span class="checkmark"></span>
                                </label>
                                <label for="blues">
                                    Blues
                                    <input type="checkbox" id="blues">
                                    <span class="checkmark"></span>
                                </label>
                                <label for="beige">
                                    Beige Tones
                                    <input type="checkbox" id="beige">
                                    <span class="checkmark"></span>
                                </label>
                                <label for="greens">
                                    Greens
                                    <input type="checkbox" id="greens">
                                    <span class="checkmark"></span>
                                </label>
                                <label for="yellows">
                                    Yellows
                                    <input type="checkbox" id="yellows">
                                    <span class="checkmark"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-9 col-md-9">
                    <div class="row">
                        <div th:each="product : ${products}" class="col-lg-4 col-md-6">
                            <div th:class="'product__item' + (${product.discount > 0} ? ' sale' : '')">
                                <div class="product__item__pic set-bg" th:attr="data-setbg=${product.image}">
                                    <div th:if="${product.discount > 0}" class="label">Sale</div>
                                    <ul class="product__hover">
                                        <li><a th:href="${product.image}" class="image-popup"><span class="arrow_expand"></span></a></li>
                                        <li><a href="#"><span class="icon_heart_alt"></span></a></li>
                                        <li>
                                            <form method="post" th:action="@{/basket/addToCart}">
                                                <input type="hidden" name="productId" th:value="${product.id}">
                                                <input type="hidden" name="quantity" value="1">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                <button type="submit" style="background:none;border:none;cursor:pointer;padding:0"><span class="icon_bag_alt"></span></button>
                                            </form>
                                        </li>
                                    </ul>
                                </div>
                                <div class="product__item__text">
                                    <h6><a th:href="@{/detail/{id}(id=${product.id})}" th:text="${product.name}">Product name</a></h6>
                                    <div class="rating">
                                        <i class="fa fa-star"></i>
                                        <i class="fa fa-star"></i>
                                        <i class="fa fa-star"></i>
                                        <i class="fa fa-star"></i>
                                        <i class="fa fa-star"></i>
                                    </div>
                                    <div class="product__price">
                                        <span th:text="${product.price} + ' ₼'">$ 59.0</span>
                                        <span th:if="${product.discount > 0}" th:text="${product.price + product.discount} + ' ₼'" style="text-decoration:line-through;font-size:0.85em;color:#999;margin-left:4px"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- Shop Section End -->
</div>

</body>

</html>
