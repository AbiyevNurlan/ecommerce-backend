<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.w3.org/1999/xhtml"
      layout:decorate="~{seller/layout}">
<head><title>İdarə Paneli</title></head>
<body>
<div layout:fragment="content">

    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">
            <i class="fas fa-store text-success mr-2"></i>
            <span th:text="${stats.shopName}">Mağaza Adı</span>
        </h1>
        <span th:if="${stats.approved}" class="badge badge-success px-3 py-2" style="font-size:.85rem;">
            <i class="fas fa-check-circle mr-1"></i> Aktiv Satıcı
        </span>
        <span th:unless="${stats.approved}" class="badge badge-warning px-3 py-2" style="font-size:.85rem;">
            <i class="fas fa-clock mr-1"></i> Təsdiqi Gözlənilir
        </span>
    </div>

    <!-- Stats Cards -->
    <div class="row">
        <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-success shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-success text-uppercase mb-1">Balans</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800"
                                 th:text="${#numbers.formatDecimal(stats.balance, 1, 2) + ' ₼'}">0.00 ₼</div>
                        </div>
                        <div class="col-auto"><i class="fas fa-wallet fa-2x text-gray-300"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-primary shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">Ümumi Məhsul</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800" th:text="${stats.totalProducts}">0</div>
                        </div>
                        <div class="col-auto"><i class="fas fa-box fa-2x text-gray-300"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-warning shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-warning text-uppercase mb-1">Aktiv Promosyon</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800" th:text="${stats.activePromotions}">0</div>
                        </div>
                        <div class="col-auto"><i class="fas fa-bullhorn fa-2x text-gray-300"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-info shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-info text-uppercase mb-1">Ümumi Gəlir</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800"
                                 th:text="${#numbers.formatDecimal(stats.totalRevenue, 1, 2) + ' ₼'}">0.00 ₼</div>
                        </div>
                        <div class="col-auto"><i class="fas fa-chart-line fa-2x text-gray-300"></i></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Commission info -->
    <div class="card shadow mb-4">
        <div class="card-body d-flex align-items-center">
            <i class="fas fa-percent fa-2x text-warning mr-3"></i>
            <div>
                <div class="font-weight-bold">Komissiya dərəcəniz:
                    <span th:text="${stats.commissionRate + '%'}" class="text-warning">10%</span>
                </div>
                <small class="text-muted">Hər satışdan bu faiz admin komissiyası olaraq tutulur.</small>
            </div>
            <div class="ml-auto">
                <a href="/seller/products/create" class="btn btn-success mr-2">
                    <i class="fas fa-plus mr-1"></i> Məhsul Əlavə Et
                </a>
                <a href="/seller/promotions" class="btn btn-warning">
                    <i class="fas fa-bullhorn mr-1"></i> Promosyon Al
                </a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
