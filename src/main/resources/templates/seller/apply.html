<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.w3.org/1999/xhtml"
      layout:decorate="~{seller/layout}">
<head><title>Satıcı Paneli – Müraciət</title></head>
<body>
<div layout:fragment="content">

    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">Satıcı Olmaq üçün Müraciət</h1>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow mb-4">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-success">Mağaza Məlumatları</h6>
                </div>
                <div class="card-body">
                    <p class="text-muted mb-4">
                        Müraciətiniz admin tərəfindən nəzərdən keçiriləcək. Təsdiq sonrasında
                        öz məhsullarınızı əlavə edib sata biləcəksiniz.
                    </p>
                    <form th:action="@{/seller/apply}" th:object="${sellerApplyDto}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="form-group">
                            <label>Mağaza Adı <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{shopName}"
                                   placeholder="Məs: Nurlan's Store" maxlength="100">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('shopName')}"
                                 th:errors="*{shopName}"></div>
                        </div>

                        <div class="form-group">
                            <label>Mağaza Təsviri</label>
                            <textarea class="form-control" th:field="*{shopDescription}"
                                      rows="4" placeholder="Mağazanız haqqında qısa məlumat..."
                                      maxlength="1000"></textarea>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('shopDescription')}"
                                 th:errors="*{shopDescription}"></div>
                        </div>

                        <button type="submit" class="btn btn-success btn-block">
                            <i class="fas fa-paper-plane mr-1"></i> Müraciəti Göndər
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
