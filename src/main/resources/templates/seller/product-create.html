<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.w3.org/1999/xhtml"
      layout:decorate="~{seller/layout}">
<head><title>Yeni Məhsul</title></head>
<body>
<div layout:fragment="content">

    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">Yeni Məhsul Əlavə Et</h1>
        <a href="/seller/products" class="btn btn-secondary btn-sm">
            <i class="fas fa-arrow-left mr-1"></i> Geri
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow mb-4">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-success">Məhsul Məlumatları</h6>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle mr-1"></i>
                        Əlavə etdiyiniz məhsul <strong>Admin Təsdiqi</strong> sonrası mağazada görünəcək.
                    </div>

                    <form th:action="@{/seller/products/create}" th:object="${productCreateDto}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="form-row">
                            <div class="form-group col-md-8">
                                <label>Məhsulun Adı <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{name}" placeholder="Məhsulun adı">
                            </div>
                            <div class="form-group col-md-4">
                                <label>Kateqoriya <span class="text-danger">*</span></label>
                                <select class="form-control" th:field="*{categoryId}">
                                    <option value="">Seçin...</option>
                                    <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Qısa Təsvir</label>
                            <input type="text" class="form-control" th:field="*{shortDescription}" placeholder="Qısa açıqlama">
                        </div>

                        <div class="form-group">
                            <label>Tam Açıqlama</label>
                            <textarea class="form-control" th:field="*{description}" rows="4"
                                      placeholder="Məhsul haqqında ətraflı məlumat..."></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label>Qiymət (₼) <span class="text-danger">*</span></label>
                                <input type="number" step="0.01" class="form-control" th:field="*{price}"
                                       placeholder="0.00" min="0">
                            </div>
                            <div class="form-group col-md-4">
                                <label>Endirim (%)</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{discount}"
                                       placeholder="0" min="0" max="100">
                            </div>
                            <div class="form-group col-md-4">
                                <label>Barkod</label>
                                <input type="text" class="form-control" th:field="*{barcode}" placeholder="Barkod">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Şəkil URL</label>
                            <input type="text" class="form-control" placeholder="https://..."
                                   name="photos[0].url">
                        </div>

                        <button type="submit" class="btn btn-success btn-block btn-lg">
                            <i class="fas fa-paper-plane mr-1"></i> Məhsulu Göndər (Təsdiqi Gözlənilir)
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
