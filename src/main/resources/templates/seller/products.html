<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.w3.org/1999/xhtml"
      layout:decorate="~{seller/layout}">
<head><title>Məhsullarım</title></head>
<body>
<div layout:fragment="content">

    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">Məhsullarım</h1>
        <a href="/seller/products/create" class="btn btn-success btn-sm shadow-sm">
            <i class="fas fa-plus fa-sm mr-1"></i> Yeni Məhsul
        </a>
    </div>

    <div class="card shadow mb-4">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-hover" width="100%" cellspacing="0">
                    <thead class="thead-light">
                    <tr>
                        <th>#</th>
                        <th>Şəkil</th>
                        <th>Məhsulun Adı</th>
                        <th>Qiymət</th>
                        <th>Stok</th>
                        <th>Status</th>
                        <th>Əməliyyat</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="7" class="text-center text-muted py-4">
                            Hələ məhsul əlavə etməmisiniz.
                            <a href="/seller/products/create">İlk məhsulunuzu əlavə edin</a>
                        </td>
                    </tr>
                    <tr th:each="p, iter : ${products}">
                        <td th:text="${iter.index + 1}"></td>
                        <td>
                            <img th:src="${p.photo}" alt="photo"
                                 style="width:50px;height:50px;object-fit:cover;border-radius:4px;"
                                 onerror="this.src='/front/img/no-image.png'">
                        </td>
                        <td th:text="${p.name}"></td>
                        <td th:text="${#numbers.formatDecimal(p.price, 1, 2) + ' ₼'}"></td>
                        <td th:text="${p.stock}"></td>
                        <td>
                            <span th:switch="${p.productStatus?.name()}">
                                <span th:case="'ACTIVE'" class="badge badge-success">Aktiv</span>
                                <span th:case="'PENDING_REVIEW'" class="badge badge-warning">Gözlənilir</span>
                                <span th:case="'REJECTED'" class="badge badge-danger">Rədd edildi</span>
                                <span th:case="'SUSPENDED'" class="badge badge-secondary">Asılı</span>
                                <span th:case="*" class="badge badge-info" th:text="${p.productStatus}">–</span>
                            </span>
                        </td>
                        <td>
                            <form th:action="@{/seller/products/delete/{id}(id=${p.id})}" method="post"
                                  onsubmit="return confirm('Silmək istədiyinizə əminsiniz?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-danger btn-sm">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</body>
</html>
