<!DOCTYPE html>
<html lang="zxx"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
</head>

<body>
<div layout:fragment="content">
    <section class="spad" style="padding: 80px 0;">
        <div class="container">
            <div class="row justify-content-center text-center">
                <div class="col-lg-6">
                    <h1 style="font-size: 100px; font-weight: 700; color: #e53935; line-height: 1;">500</h1>
                    <h2 class="mb-3">Internal Server Error</h2>
                    <p class="mb-4 text-muted">
                        Something went wrong on our end. Please try again later.
                    </p>
                    <p th:if="${path}" class="text-muted small">
                        Requested path: <code th:text="${path}"></code>
                    </p>
                    <a th:href="@{/}" class="primary-btn">Back to Home</a>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
