# ── Development profile ──────────────────────────────────────────────────────
# Show SQL in console for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf — disable template cache in dev so changes take effect without restart
spring.thymeleaf.cache=false

# Detailed actuator for local
management.endpoint.health.show-details=always

# RabbitMQ — disable for local development (not required)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# Logging: project DEBUG, everything else INFO
logging.level.az.edu.itbrains=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
