name: "CI — Build, Test & Docker"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  IMAGE_NAME: ecommerce-app

jobs:

  # ═══════════════════════════════════════════════════════════════
  # JOB 1 — Build & Test
  # ═══════════════════════════════════════════════════════════════
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ecommerce_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Build & Test
        run: ./mvnw clean verify -B
        env:
          SPRING_PROFILES_ACTIVE: test
          TEST_DB_URL: jdbc:postgresql://localhost:5432/ecommerce_test
          TEST_DB_USERNAME: test
          TEST_DB_PASSWORD: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════════════════
  # JOB 2 — Docker Build
  # ═══════════════════════════════════════════════════════════════
  docker-build:
    name: Docker Build
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Package JAR (skip tests)
        run: chmod +x mvnw && ./mvnw package -DskipTests -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker build -t ${{ env.IMAGE_NAME }}:latest .

      - name: Show Docker image size
        run: docker images ${{ env.IMAGE_NAME }}

      # ── Docker Hub Push (yalnız main branch-da) ──
      # Aktivləşdirmək üçün:
      #   1. GitHub repo → Settings → Secrets → New:
      #      - DOCKER_USERNAME (Docker Hub istifadəçi adınız)
      #      - DOCKER_PASSWORD (Docker Hub access token)
      #   2. Aşağıdakı comment-ləri silin
      #
      # - name: Login to Docker Hub
      #   if: github.ref == 'refs/heads/main'
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}
      #
      # - name: Push to Docker Hub
      #   if: github.ref == 'refs/heads/main'
      #   run: |
      #     docker tag ${{ env.IMAGE_NAME }}:latest ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
      #     docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      #     docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
      #     docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ═══════════════════════════════════════════════════════════════
  # JOB 3 — Security Scan (Dependency Vulnerability Check)
  # ═══════════════════════════════════════════════════════════════
  security-scan:
    name: Security Scan
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: OWASP Dependency Check
        run: |
          chmod +x mvnw
          ./mvnw org.owasp:dependency-check-maven:check -B \
            -DfailBuildOnCVSS=9 \
            -DsuppressionsFile=owasp-suppressions.xml || true
        continue-on-error: true

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          if-no-files-found: ignore
